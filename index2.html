<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Live Board</title>
  
  <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "vue": "https://unpkg.com/vue@3/dist/vue.esm-browser.js",
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>

  <style>
    /* Variables de diseño para fácil mantenimiento */
    :root {
      --bg-main: #0f172a;          /* Azul oscuro profundo */
      --bg-panel: #1e293b;        /* Azul pizarra para paneles */
      --bg-card: #293548;         /* Tarjetas de respuestas */
      --text-main: #f8fafc;       /* Blanco brillante */
      --text-muted: #94a3b8;      /* Gris azulado para textos secundarios */
      --accent: #38bdf8;          /* Azul brillante eléctrico para destacar */
      --accent-hover: #0ea5e9;
      --border: #334155;          /* Bordes sutiles */
    }

    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-container { 
      display: flex; 
      height: 100vh; 
    }

    .panel { 
      padding: 2.5rem; 
      box-sizing: border-box; 
      display: flex; 
      flex-direction: column;
    }

    /* Panel Izquierdo (Formulario) */
    .input-panel { 
      width: 40%; 
      background: var(--bg-panel); 
      border-right: 1px solid var(--border); 
      box-shadow: 10px 0 30px rgba(0,0,0,0.2);
      z-index: 10;
    }

    /* Panel Derecho (Feed en tiempo real) */
    .feed-panel { 
      width: 60%; 
      background: var(--bg-main);
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .feed-panel h2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Indicador de "Live" parpadeante */
    .live-badge {
      font-size: 0.8rem;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .prompt { 
      font-size: 1.1rem; 
      line-height: 1.5; 
      color: var(--text-muted);
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.02);
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }

    .form-group { 
      margin-bottom: 1.5rem; 
    }

    label { 
      display: block; 
      font-weight: 600; 
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem; 
      color: var(--text-muted);
    }

    input, textarea { 
      width: 100%; 
      padding: 0.9rem; 
      background: var(--bg-main);
      border: 1px solid var(--border); 
      border-radius: 8px; 
      color: var(--text-main);
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    textarea { resize: none; }

    button { 
      background: var(--accent); 
      color: var(--bg-main); 
      padding: 1rem; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      transition: all 0.2s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    button:hover:not(:disabled) { 
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled { 
      background: var(--border); 
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Contenedor del Feed con Scrollbar estilizada */
    .feed-container { 
      flex-grow: 1; 
      overflow-y: auto; 
      padding-right: 10px; 
    }

    .feed-container::-webkit-scrollbar {
      width: 6px;
    }
    .feed-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .feed-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Tarjetas de Respuestas */
    .post-card { 
      background: var(--bg-card); 
      padding: 1.25rem; 
      border-radius: 10px; 
      margin-bottom: 1.25rem; 
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-card:hover {
      transform: scale(1.01);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .post-header { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 0.75rem; 
      font-size: 0.95rem;
    }

    .post-header strong {
      color: var(--accent);
      font-weight: 600;
    }

    .time { color: var(--text-muted); font-size: 0.85rem; }
    .post-body { margin: 0; line-height: 1.6; color: #e2e8f0; white-space: pre-wrap; font-size: 1rem; }
    .empty { color: var(--text-muted); font-style: italic; text-align: center; padding-top: 3rem; }
  </style>
</head>
<body>

  <div id="app">
    <div class="app-container">
      <div class="panel input-panel">
        <h2>{{ currentTitle }}</h2>
        <p class="prompt">{{ currentQuestion }}</p>
        
        <div class="form-group">
          <label>Your Name / Alias</label>
          <input v-model="name" type="text" placeholder="e.g., Prof. Luis" />
        </div>

        <div class="form-group">
          <label>Your Response</label>
          <textarea v-model="answer" rows="6" placeholder="Write your thoughts here..."></textarea>
        </div>

        <button @click="submitAnswer" :disabled="!name.trim() || !answer.trim()">Submit to Board</button>
      </div>

      <div class="panel feed-panel">
        <h2>
          Peer Submissions 
          <span class="live-badge">● LIVE</span>
        </h2>
        <div class="feed-container">
          <div v-if="posts.length === 0" class="empty">Waiting for submissions...</div>
          <div v-for="post in posts" :key="post.id" class="post-card">
            <div class="post-header">
              <strong>{{ post.student_name }}</strong>
              <span class="time">{{ formatTime(post.created_at) }}</span>
            </div>
            <p class="post-body">{{ post.response_text }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createApp, ref, onMounted, onUnmounted, computed } from 'vue'
    import { createClient } from '@supabase/supabase-js'

    createApp({
      setup() {
        const supabaseUrl = 'https://jomqgtqtwgaxdgwywhtg.supabase.co'
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvbXFndHF0d2dheGRnd3l3aHRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTkyNDgsImV4cCI6MjA5ODQ5NTI0OH0.aTKt1oLBpyMMNL0S2Lcv3C1ZyOkmDcxNP2J2BgxluBg'
        const supabase = createClient(supabaseUrl, supabaseKey)

        const urlParams = new URLSearchParams(window.location.search)
        const sessionId = ref(urlParams.get('session') || 'general')

        // Banco de preguntas (Opción 1 adaptada)
        const bancoDePreguntas = {
          '610-course-expectations': {
            title: 'DMGC 610 - Course Expectations',
            question: 'Tell me three course expectations you have.'
          },
          '610-module1-checkin': {
            title: 'Module 1 Check-in',
            question: "What did you think of this week's module, or what were your first impressions?"
          },
          '610-module1-conclusion': {
            title: 'Module Conclusion',
            question: 'In conclusion, what do you consider to be the key importance of studying data analytics in a digital media context?'
          }
        }

        const currentTitle = computed(() => {
          return bancoDePreguntas[sessionId.value]?.title || 'Interactive Session'
        })

        const currentQuestion = computed(() => {
          return bancoDePreguntas[sessionId.value]?.question || 'Please answer the prompt below:'
        })

        const name = ref('')
        const answer = ref('')
        const posts = ref([])
        let realtimeChannel = null

        const fetchPosts = async () => {
          const { data, error } = await supabase
            .from('case_study_responses')
            .select('*')
            .eq('session_id', sessionId.value)
            .order('created_at', { ascending: false })
          
          if (!error) posts.value = data
        }

        const submitAnswer = async () => {
          if (!name.value.trim() || !answer.value.trim()) return

          const { error } = await supabase
            .from('case_study_responses')
            .insert([{ 
              student_name: name.value, 
              response_text: answer.value,
              session_id: sessionId.value
            }])

          if (!error) {
            answer.value = ''
          }
        }

        const formatTime = (dateString) => {
          return new Date(dateString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }

        onMounted(() => {
          fetchPosts()

          realtimeChannel = supabase
            .channel(`public:case_study_responses:${sessionId.value}`)
            .on('postgres_changes', { 
              event: 'INSERT', 
              schema: 'public', 
              table: 'case_study_responses',
              filter: `session_id=eq.${sessionId.value}`
            }, (payload) => {
              posts.value.unshift(payload.new)
            })
            .subscribe()
        })

        onUnmounted(() => {
          if (realtimeChannel) supabase.removeChannel(realtimeChannel)
        })

        return {
          name,
          answer,
          posts,
          currentTitle,
          currentQuestion,
          submitAnswer,
          formatTime
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
