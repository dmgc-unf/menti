    /* Variables de diseño para fácil mantenimiento */
    /* Variables de diseño minimalistas y neutrales */
    :root {
      --bg-main: #ffffff;
      /* Fondo puro blanco */
      --bg-panel: #fafafa;
      /* Gris casi imperceptible para el panel lateral */
      --bg-card: #ffffff;
      /* Tarjetas limpias sobre el fondo principal */
      --text-main: #111111;
      /* Texto negro de alta legibilidad */
      --text-muted: #666666;
      /* Gris medio para descripciones secundarios */
      --accent: #111111;
      /* Negro puro para botones y acentos de autoría */
      --accent-hover: #333333;
      /* Gris oscuro al pasar el ratón */
      --border: #e5e5e5;
      /* Bordes delgados y muy tenues */
    }

    body,
    html {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    .panel {
      padding: 2.5rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    /* Panel Izquierdo (Formulario) */
    .input-panel {
      width: 40%;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      box-shadow: 10px 0 30px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }

    /* Panel Derecho (Feed en tiempo real) */
    .feed-panel {
      width: 60%;
      background: var(--bg-main);
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.75rem;
    }

    .feed-panel h2 {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

      font-size: 0.8rem;
      background: rgba(56, 189, 248, 0.15);
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }

    .prompt {
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--text-main);
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.02);
      padding: 1rem;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
    }

    input,
    textarea {
      width: 100%;
      padding: 0.9rem;
      background: var(--bg-main);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-main);
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    textarea {
      resize: none;
    }

    button {
      background: var(--accent);
      color: #ffffff;
      /* Forzado a blanco para perfecto contraste con el botón negro */
      padding: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      transition: all 0.2s ease;
      margin-top: 1rem;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
      /* This ensures it reads the dynamic Vue color */
      transform: translateY(-1px);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Contenedor del Feed con Scrollbar estilizada */
    .feed-container {
      flex-grow: 1;
      overflow-y: auto;
      padding-right: 10px;
    }

    .feed-container::-webkit-scrollbar {
      width: 6px;
    }

    .feed-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .feed-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Tarjetas de Respuestas */
    .post-card {
      background: var(--bg-card);
      padding: 1.25rem;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .post-card:hover {
      transform: scale(1.01);
      border-color: var(--accent);
      /* Cambiado para usar el color del curso */
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }

    .post-header strong {
      color: var(--accent);
      font-weight: 600;
    }

    .time {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .post-body {
      margin: 0;
      line-height: 1.6;
      color: var(--text-main);
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding-top: 3rem;
    }
  </style>
</head>

            .select('*')
            .eq('session_id', sessionId.value)
            .order('created_at', { ascending: false })

        }

        const submitAnswer = async () => {
          if (!name.value.trim() || !answer.value.trim()) return

          const { error } = await supabase
            .from('case_study_responses')
            .insert([{

              response_text: answer.value,
              session_id: sessionId.value
            }])

          }

              schema: 'public',
              table: 'case_study_responses',
              filter: `session_id=eq.${sessionId.value}`
            }, (payload) => {
              posts.value.unshift(payload.new)
            })
            .subscribe()
        })



        onUnmounted(() => {

        })
